name: Build and deploy Python app to Azure Web App - dagensord-fastapi

on:
  push:
    branches:
      - f124235341512hklfdfhsklfhlk
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt
          cd ..

      - name: Zip artifact for deployment
        run: |
          cd server
          zip ../release.zip ./* -r
          cd ..

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'dagensord-fastapi'
          # slot-name: 'Production'
          # publish-profile: ${{ secrets.AzureAppService_PublishProfile_c5594bb91d98436893d68610b215bcd1 }}
